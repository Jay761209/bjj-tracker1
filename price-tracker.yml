name: BJJ Price Tracker

on:
  schedule:
    # Draait elke dag om 07:00 UTC (09:00 NL-tijd in de zomer, 08:00 in de winter)
    - cron: "0 7 * * *"
  workflow_dispatch: {}  # handmatig starten via de Actions-tab

permissions:
  contents: write

jobs:
  track-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run price tracker
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/bjj_price_tracker.py

      - name: Commit updated data
        run: |
          git config user.name "bjj-price-tracker-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --quiet --cached || git commit -m "Dagelijkse prijsupdate $(date +'%Y-%m-%d')"
          git push
