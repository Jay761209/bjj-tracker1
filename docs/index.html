<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BJJ Prijstracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --surface: #1a1d24;
    --surface2: #23262f;
    --border: #2e323c;
    --text: #e8e9ec;
    --text-secondary: #9aa0ab;
    --accent: #4f8cff;
    --green: #3ecf8e;
    --red: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  input, select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
  }
  input { flex: 2; min-width: 180px; }
  select { flex: 1; min-width: 140px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--surface); border-radius: 10px; overflow: hidden; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  th { color: var(--text-secondary); font-weight: 500; background: var(--surface2); position: sticky; top: 0; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .price { font-weight: 600; text-align: right; }
  .price-drop { color: var(--green); }
  .old-price { text-decoration: line-through; color: var(--text-secondary); font-weight: 400; font-size: 11px; margin-right: 4px; }
  .drop-badge { display: inline-block; background: rgba(62,207,142,0.15); color: var(--green); font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 6px; margin-left: 6px; }
  .out-of-stock { opacity: 0.45; }
  .table-wrap { max-height: 70vh; overflow-y: auto; border-radius: 10px; }
  .updated { font-size: 12px; color: var(--text-secondary); margin-top: 16px; }
  .loading, .error { padding: 40px; text-align: center; color: var(--text-secondary); }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .chart-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .filtered-note { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
</style>
</head>
<body>
<div class="container">
  <h1>BJJ Prijstracker</h1>
  <div class="subtitle">Dagelijks bijgewerkte prijzen van alle gevolgde webshops</div>

  <div id="content">
    <div class="loading">Data laden...</div>
  </div>
</div>

<script>
async function loadData() {
  const contentEl = document.getElementById('content');
  try {
    const res = await fetch('latest_snapshot.json?t=' + Date.now());
    if (!res.ok) throw new Error('Kon data niet laden');
    const rawData = await res.json();

    // Filter producten zonder echte prijs (samples, weggeefacties, e.d.)
    const totalBeforeFilter = rawData.length;
    const data = rawData.filter(d => d.price > 0);
    const filteredCount = totalBeforeFilter - data.length;

    let history = [];
    try {
      const histRes = await fetch('price_history.json?t=' + Date.now());
      if (histRes.ok) history = await histRes.json();
    } catch (e) {
      // geschiedenis is optioneel -- geen probleem als die (nog) niet bestaat
    }

    renderDashboard(data, filteredCount, history);
  } catch (e) {
    contentEl.innerHTML = '<div class="error">Kon de data nog niet vinden. Deze pagina toont data zodra de eerste geplande run is voltooid.</div>';
  }
}

function renderDashboard(data, filteredCount, history) {
  const contentEl = document.getElementById('content');
  const shops = [...new Set(data.map(d => d.shop))].sort();

  const avg = data.length ? (data.reduce((s, d) => s + d.price, 0) / data.length) : 0;
  const min = data.length ? Math.min(...data.map(d => d.price)) : 0;
  const inStock = data.filter(d => d.in_stock).length;
  const dropsCount = data.filter(d => d.previous_price != null && d.price < d.previous_price).length;

  contentEl.innerHTML = `
    <div class="stats">
      <div class="stat-card"><div class="stat-label">Producten</div><div class="stat-value">${data.length.toLocaleString('nl-NL')}</div></div>
      <div class="stat-card"><div class="stat-label">Shops</div><div class="stat-value">${shops.length}</div></div>
      <div class="stat-card"><div class="stat-label">Gemiddelde prijs</div><div class="stat-value">&euro;${avg.toFixed(2)}</div></div>
      <div class="stat-card"><div class="stat-label">Goedkoopste</div><div class="stat-value">&euro;${min.toFixed(2)}</div></div>
      <div class="stat-card"><div class="stat-label" style="color: var(--green);">Prijsdalingen</div><div class="stat-value" style="color: var(--green);">${dropsCount}</div></div>
    </div>

    <div class="filtered-note">
      ${filteredCount > 0 ? `${filteredCount.toLocaleString('nl-NL')} product(en) zonder geldige prijs (bijv. samples of weggeefacties) zijn uit dit overzicht gefilterd.` : ''}
    </div>

    ${history.length > 1 ? `
    <div class="chart-card">
      <div class="chart-title">Aantal bijgehouden producten over tijd</div>
      <canvas id="history-chart" height="80"></canvas>
    </div>
    ` : ''}

    <div class="controls">
      <input type="text" id="search" placeholder="Zoek merk of product..." />
      <select id="shop-filter">
        <option value="">Alle shops (${shops.length})</option>
        ${shops.map(s => `<option value="${s}">${s}</option>`).join('')}
      </select>
      <select id="sort-select">
        <option value="price-asc">Prijs laag-hoog</option>
        <option value="price-desc">Prijs hoog-laag</option>
        <option value="brand">Merk A-Z</option>
        <option value="drops">Grootste prijsdalingen eerst</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Merk</th>
            <th>Product</th>
            <th>Maat</th>
            <th>Shop</th>
            <th style="text-align:right;">Prijs</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="updated">Automatisch bijgewerkt door GitHub Actions &middot; laatste keer geladen: ${new Date().toLocaleString('nl-NL')}</div>
  `;

  if (history.length > 1 && window.Chart) {
    const ctx = document.getElementById('history-chart');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: history.map(h => h.date),
        datasets: [
          {
            label: 'Aantal producten',
            data: history.map(h => h.total_products),
            borderColor: '#4f8cff',
            backgroundColor: 'rgba(79,140,255,0.1)',
            tension: 0.3,
            fill: true,
            yAxisID: 'y',
          },
          {
            label: 'Prijsdalingen',
            data: history.map(h => h.price_drops),
            borderColor: '#3ecf8e',
            backgroundColor: 'rgba(62,207,142,0.1)',
            tension: 0.3,
            fill: false,
            yAxisID: 'y1',
          },
        ],
      },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#9aa0ab' } },
        },
        scales: {
          x: { ticks: { color: '#9aa0ab' }, grid: { color: '#2e323c' } },
          y: { position: 'left', ticks: { color: '#9aa0ab' }, grid: { color: '#2e323c' } },
          y1: { position: 'right', ticks: { color: '#9aa0ab' }, grid: { display: false } },
        },
      },
    });
  }

  function render() {
    const search = document.getElementById('search').value.toLowerCase();
    const shopFilter = document.getElementById('shop-filter').value;
    const sortMode = document.getElementById('sort-select').value;

    let rows = data.filter(d => {
      const matchesSearch = !search || d.brand.toLowerCase().includes(search) || d.product.toLowerCase().includes(search);
      const matchesShop = !shopFilter || d.shop === shopFilter;
      return matchesSearch && matchesShop;
    });

    if (sortMode === 'price-asc') rows.sort((a, b) => a.price - b.price);
    else if (sortMode === 'price-desc') rows.sort((a, b) => b.price - a.price);
    else if (sortMode === 'brand') rows.sort((a, b) => a.brand.localeCompare(b.brand));
    else if (sortMode === 'drops') {
      rows = rows.filter(d => d.previous_price != null && d.price < d.previous_price);
      rows.sort((a, b) => (a.price - a.previous_price) - (b.price - b.previous_price));
    }

    rows = rows.slice(0, 500); // performance: toon max 500 rijen tegelijk

    document.getElementById('table-body').innerHTML = rows.map(d => {
      const isDrop = d.previous_price != null && d.price < d.previous_price;
      const pctOff = isDrop ? Math.round((1 - d.price / d.previous_price) * 100) : 0;
      const priceCell = isDrop
        ? `<span class="old-price">&euro;${d.previous_price.toFixed(2)}</span><span class="price-drop">&euro;${d.price.toFixed(2)}</span><span class="drop-badge">-${pctOff}%</span>`
        : `&euro;${d.price.toFixed(2)}`;
      return `
      <tr class="${!d.in_stock ? 'out-of-stock' : ''}">
        <td>${escapeHtml(d.brand)}</td>
        <td><a href="${d.url}" target="_blank" rel="noopener">${escapeHtml(d.product)}</a></td>
        <td>${escapeHtml(d.size)}</td>
        <td>${escapeHtml(d.shop)}</td>
        <td class="price">${priceCell}</td>
      </tr>
    `;
    }).join('') || '<tr><td colspan="5" style="text-align:center; padding: 24px;">Geen resultaten</td></tr>';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('shop-filter').addEventListener('change', render);
  document.getElementById('sort-select').addEventListener('change', render);
  render();
}

loadData();
</script>
</body>
</html>
